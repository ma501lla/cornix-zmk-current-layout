name: Publish firmware download

on:
  workflow_run:
    workflows: ["Build ZMK firmware"]
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Package firmware
        run: zip -j firmware.zip firmware/*

      - name: Publish firmware release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest-firmware --cleanup-tag --yes || true
          gh release create latest-firmware firmware.zip \
            --title "Latest Cornix firmware" \
            --notes "Automatically built from the latest successful main branch configuration."
